name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # No dependencies to install — tests run on Node's built-in test runner.
      # `node --test` (no args) auto-discovers tests/*.test.js across Node 20–24.
      - name: Run unit tests
        run: node --test
      - name: Check icons regenerate (informational)
        run: |
          node scripts/make-icons.mjs
          git diff --exit-code -- icons/ || echo "::warning::icons differ after regen (platform zlib) — not blocking"
